name: wherenow
description: A family safety and real-time location tracking app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.1.1
  http: ^1.1.0
  socket_io_client: ^2.0.3+1
  shared_preferences: ^2.2.2
  location: ^5.0.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  permission_handler: ^11.0.1
  flutter_local_notifications: ^16.1.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  firebase_messaging: ^16.3.0
  sqflite: ^2.4.3
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_background_service: ^5.1.0
  battery_plus: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
